! ============================================================
! SW1 - Switch LAN A
! ============================================================

enable
configure terminal
hostname SW1

vlan 10
 name LAN_A

interface GigabitEthernet0/0
 description Enlace hacia R1 G0/1
 switchport mode access
 switchport access vlan 10
 no shutdown

interface GigabitEthernet0/1
 description Enlace hacia PC-A
 switchport mode access
 switchport access vlan 10
 spanning-tree portfast
 no shutdown

end
write memory
