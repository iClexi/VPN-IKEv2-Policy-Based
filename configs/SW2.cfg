! ============================================================
! SW2 - Switch LAN B
! ============================================================

enable
configure terminal
hostname SW2

vlan 20
 name LAN_B

interface GigabitEthernet0/0
 description Enlace hacia R2 G0/1
 switchport mode access
 switchport access vlan 20
 no shutdown

interface GigabitEthernet0/1
 description Enlace hacia PC-B
 switchport mode access
 switchport access vlan 20
 spanning-tree portfast
 no shutdown

end
write memory
